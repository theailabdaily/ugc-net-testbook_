name: Post scheduled Telegram messages

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron/post-scheduled
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          CRON_SECRET:   ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$DASHBOARD_URL" ]; then
            echo "DASHBOARD_URL secret is not set."
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is not set."
            exit 1
          fi

          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              --max-time 60 \
              -H "x-cron-secret: $CRON_SECRET" \
              "$DASHBOARD_URL/api/cron/post-scheduled")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Posted scheduled messages successfully (attempt $i):"
              cat /tmp/response.json
              exit 0
            fi

            echo "Attempt $i: HTTP $HTTP_CODE. Retrying in ${i}s…"
            cat /tmp/response.json
            sleep $i
          done

          echo "All retries failed."
          exit 1
